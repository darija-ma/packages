name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish-humanize-duration:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show tool versions
        run: |
          node --version
          npm --version
          bun --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run checks
        run: bun run check

      - name: Verify package version matches tag
        working-directory: packages/humanize-duration
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Fail if version is already published
        working-directory: packages/humanize-duration
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "@darija/humanize-duration@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "@darija/humanize-duration@$PACKAGE_VERSION is already published"
            exit 1
          fi

      - name: Publish package
        working-directory: packages/humanize-duration
        run: npm publish --access public
